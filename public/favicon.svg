<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- DNA Double Helix with Microbiome dots - representing genomics & microbiome research -->
  
  <!-- Left strand of DNA helix -->
  <path d="M32 16 Q64 40, 32 64 Q0 88, 32 112" fill="none" stroke="#0d9488" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Right strand of DNA helix -->
  <path d="M96 16 Q64 40, 96 64 Q128 88, 96 112" fill="none" stroke="#0d9488" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Connecting rungs (base pairs) -->
  <line x1="38" y1="28" x2="90" y2="28" stroke="#115e59" stroke-width="4" stroke-linecap="round"/>
  <line x1="26" y1="46" x2="102" y2="46" stroke="#115e59" stroke-width="4" stroke-linecap="round"/>
  <line x1="32" y1="64" x2="96" y2="64" stroke="#115e59" stroke-width="4" stroke-linecap="round"/>
  <line x1="26" y1="82" x2="102" y2="82" stroke="#115e59" stroke-width="4" stroke-linecap="round"/>
  <line x1="38" y1="100" x2="90" y2="100" stroke="#115e59" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Microbiome dots scattered around - representing microbial communities -->
  <circle cx="64" cy="28" r="5" fill="#0d9488"/>
  <circle cx="64" cy="64" r="5" fill="#0d9488"/>
  <circle cx="64" cy="100" r="5" fill="#0d9488"/>
  <circle cx="50" cy="46" r="3" fill="#14b8a6"/>
  <circle cx="78" cy="46" r="3" fill="#14b8a6"/>
  <circle cx="50" cy="82" r="3" fill="#14b8a6"/>
  <circle cx="78" cy="82" r="3" fill="#14b8a6"/>
</svg>
